<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Login</title>
        <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="header/header.css">
    <link rel="stylesheet" type="text/css" href="header.css">
    <link rel="stylesheet" href="footer/footer.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f5f5f5;
            min-height: 100vh;
        }

        .login-box {
            width: 400px;
        }

        .btn-login {
            font-size: 1.2rem;
        }
    </style>
</head>

<body>

    <div id="topo"></div>

    <main class="container d-flex justify-content-center align-items-center py-5">
        <div class="login-box text-center">

            <!-- Logo -->
            <img src="https://github.com/DWBA4/dwba4_semana_imagens/blob/master/ifsp.png?raw=true" alt="Logo" width="70" class="mb-4">

            <h1 class="mb-4">Faça login</h1>

            <form>
                <div class="form-floating mb-2">
                    <input type="email" class="form-control" id="email" placeholder="Seu email" required>
                    <label for="email">Seu email</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="senha" placeholder="Senha" required>
                    <label for="senha">Senha</label>
                </div>

                <div class="form-check d-flex justify-content-center mb-4">
                    <input class="form-check-input me-2" type="checkbox" id="lembrar">
                    <label class="form-check-label" for="lembrar">
                        Lembrar de mim
                    </label>
                </div>

                <div class="mb-4">
                    <a href="#" class="text-decoration-none">
                        Esqueci a senha
                    </a>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-login">
                    Login
                </button>
            </form>

            <p class="text-secondary mt-5 mb-0">
                © 2020
            </p>

        </div>
    </main>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        fetch("header/header.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("topo").innerHTML = data;
            });

        fetch("footer/footer.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("footer").innerHTML = data;
            });
    </script>

</body>

</html>
